# Friends of the Poway Library Capstone Infographic
Title: "Friends of the Poway Library"
Description: "A full-stack redesign of powayfriends.org — replacing dead history pages, placeholder images, and a 'Watch this space for 2025' banner with a live book catalog, gamification hub, volunteer flow, and a deployed Flask backend."

