    description: "The Poway Symphony Orchestra originally used a static Google Sites page with dense text, minimal navigation, and no interactivity. Key content like concerts, musician rosters, and organizational storytelling were difficult to access and lacked engagement. This capstone rebuilt the entire experience as a custom web platform: dynamic concert listings with countdowns, a musician directory with filtering and audio playback, gamified exploration systems like EXP progression and interactive games, and a Flask-backed admin interface. The redesign preserves real PSO content while transforming how users explore, learn, and engage with the orchestra."

    keyPoints:
      - "Rebuilt the PSO website from a static Google Sites page into a fully custom interactive frontend with modern layout and navigation"
      - "Implemented a Concerts section with real 2025–2026 season data, countdown timers, calendar integration, and direct ticket access"
      - "Designed a structured Conductor page presenting John LoPiccolo’s biography and orchestra history in a clear, engaging format"
      - "Created a Musician Directory with section-based filtering, instrument grouping, and audio playback instead of a plain text roster"
      - "Developed a gamified EXP system that tracks user progress as they explore different parts of the site"
      - "Built interactive experiences including Orchestra Builder, Virtual Conductor, and Tuning the Orchestra to teach symphonic concepts"
      - "Consolidated Join information (rehearsals, registration, attire, contact) into a single accessible section"
      - "Ensured full responsiveness across mobile, tablet, and desktop devices"
      - "Connected a Flask backend to support admin functionality and dynamic content delivery"

    tech:
      - "HTML"
      - "CSS"
      - "JavaScript (ES6+)"
      - "Flask + Python"
      - "Responsive Design"
      - "Figma"
      - "User Research and Testing"

    impact:
      - "Transforms a passive informational website into an interactive experience that actively engages visitors"
      - "Makes concert information easier to discover and act on, increasing attendance potential"
      - "Gamified elements encourage deeper exploration and repeat visits, especially among younger audiences"
      - "Musician directory with audio playback helps users better understand the structure and sound of the orchestra"
      - "Centralized Join section lowers barriers for new musicians to get involved"
      - "Preserves and elevates real PSO content, improving credibility and storytelling for the organization"
      - "Bridges the gap between traditional arts organizations and modern web expectations"
      - "Demonstrates a fully deployed prototype with both frontend and backend systems, moving beyond design into implementation"