  function isAdminUser(user) {
    if (!user) return false;
    if (user.is_admin === true) return true;
    return ['admin', 'superadmin'].indexOf(String(user.role || '').toLowerCase()) !== -1;
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function normalizeStoredMemberCard(card) {
    return {
      id: String(card && card.id || ''),
      ownerUid: String(card && (card.ownerUid || card.owner_uid) || ''),
      ownerName: String(card && (card.ownerName || card.owner_name) || ''),
      family: String(card && card.family || ''),
      sectionId: String(card && (card.sectionId || card.section_id) || ''),
      instrumentTitle: String(card && (card.instrumentTitle || card.instrument_title) || ''),
      image: String(card && (card.image || card.image_url) || ''),
      bio: String(card && card.bio || ''),
      createdByUid: String(card && (card.createdByUid || card.created_by_uid) || ''),
      updatedAt: String(card && (card.updatedAt || card.updated_at) || '')
    };
  }

  function loadStoredMemberCards() {
    return memberCardsCache.slice();
  }

  function saveStoredMemberCards(cards) {
    memberCardsCache = cards.map(normalizeStoredMemberCard).filter(function (card) { return card.id; });
    return loadStoredMemberCards();
  }

  function upsertStoredMemberCard(card) {
    var cards = loadStoredMemberCards();
    var nextCard = normalizeStoredMemberCard(card);
    var existingCardIndex = cards.findIndex(function (entry) { return entry.id === nextCard.id; });

    if (existingCardIndex >= 0) {
      cards[existingCardIndex] = nextCard;
    } else {
      cards.push(nextCard);
    }

    return saveStoredMemberCards(cards);
  }

  function fetchStoredMemberCards() {
    return fetch(psoPythonURI + '/api/pso/member-cards', {
      method: 'GET',
      mode: 'cors',
      cache: 'default',
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json',
        'X-Origin': 'client'
      }
    }).then(function (response) {
      if (!response.ok) throw new Error('Unable to load member cards.');
      return response.json();
    }).then(function (data) {
      var cards = Array.isArray(data && data.cards) ? data.cards : [];
      memberCardsCache = cards.map(normalizeStoredMemberCard).filter(function (card) { return card.id; });
      return loadStoredMemberCards();
    }).catch(function () {
      memberCardsCache = [];
      return [];
    });
  }

  function createMemberCard(cardInput) {
    return fetch(psoPythonURI + '/api/pso/admin/member-cards', {
      method: 'POST',
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        owner_uid: cardInput.ownerUid,
        owner_name: cardInput.ownerName,
        family: cardInput.family,
        section_id: cardInput.sectionId,
        instrument_title: cardInput.instrumentTitle || '',
        image_url: cardInput.imageUrl || '',
        bio: cardInput.bio || ''
      })
    }).then(function (response) {
      return response.json().catch(function () { return {}; }).then(function (data) {
        if (!response.ok) {
          throw new Error(data.message || 'Failed to create member card');
        }
        return normalizeStoredMemberCard(data.card || {});
      });
    });
  }

  function updateMemberCard(cardId, cardInput) {
    return fetch(psoPythonURI + '/api/pso/member-cards/' + encodeURIComponent(cardId), {
      method: 'PATCH',
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(cardInput)
    }).then(function (response) {
      return response.json().catch(function () { return {}; }).then(function (data) {
        if (!response.ok) {
          throw new Error(data.message || 'Failed to update member card');
        }
        return normalizeStoredMemberCard(data.card || {});
      });
    });
  }

  function removeMemberCard(cardId) {
    return fetch(psoPythonURI + '/api/pso/member-cards/' + encodeURIComponent(cardId), {
      method: 'DELETE',
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json'
      }
    }).then(function (response) {
      return response.json().catch(function () { return {}; }).then(function (data) {
        if (!response.ok) {
          throw new Error(data.message || 'Failed to delete member card');
        }
        return data;
      });
    });
  }

  function canEditMemberCard(card) {
    if (!card || !currentAccountUser) return false;
    return isAdminUser(currentAccountUser) || String(currentAccountUser.uid || '') === String(card.ownerUid || '');
  }

  function getStoredMemberCard(cardId) {
    return loadStoredMemberCards().find(function (card) { return card.id === cardId; }) || null;
  }

  function getStoredMemberCardsForSection(familyKey, sectionId) {
    return loadStoredMemberCards().filter(function (card) {
      return card.family === familyKey && card.sectionId === sectionId;
    });
  }

  function toDisplayMemberCard(card) {
    return {
      name: card.ownerName,
      image: card.image,
      bio: card.bio,
      instrumentTitle: card.instrumentTitle,
      isCustom: true,
      cardId: card.id,
      editable: Boolean(memberCardEditor) && canManageMemberCardEditor() && canEditMemberCard(card)
    };
  }

  function setAccountLinks(user) {
    if (!accountLinks.length) return;
    accountLinks.forEach(function (link) {
      var signInHref = link.dataset.signinHref || '{{ "/powayorchestra/signin/" | relative_url }}';
      var profileHref = link.dataset.profileHref || '{{ "/powayorchestra/profile/" | relative_url }}';
      if (user && user.name) {
        link.textContent = user.name;
        link.href = profileHref;
        link.setAttribute('aria-label', user.name + ' profile');
      } else {
        link.textContent = link.dataset.signinLabel || 'Sign In';
        link.href = signInHref;
        link.setAttribute('aria-label', link.dataset.signinLabel || 'Sign In');
      }
    });
  }

      mode: 'cors',
      cache: 'default',
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json',
        'X-Origin': 'client'
      }
    }).then(function (response) {
      if (!response.ok) return null;
      return response.json();
    }).then(function (data) {
      currentAccountUser = data && data.name ? data : null;
      setAccountLinks(currentAccountUser);
      renderMemberCardControls();
      refreshVisibleMusicianCards();
    }).catch(function () {
      currentAccountUser = null;
      setAccountLinks(null);
      renderMemberCardControls();
    });
  }
