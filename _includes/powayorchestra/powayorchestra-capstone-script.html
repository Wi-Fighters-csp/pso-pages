  function isAdminUser(user) {
    if (!user) return false;
    if (user.is_admin === true) return true;
    return ['admin', 'superadmin'].indexOf(String(user.role || '').toLowerCase()) !== -1;

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function getMemberCardStorageKey() {
    return 'pso-member-cards';
  }

  function normalizeStoredMemberCard(card) {
    return {
      id: String(card && card.id || ''),
      ownerUid: String(card && card.ownerUid || ''),
      ownerName: String(card && card.ownerName || ''),
      family: String(card && card.family || ''),
      sectionId: String(card && card.sectionId || ''),
      instrumentTitle: String(card && card.instrumentTitle || ''),
      image: String(card && card.image || ''),
      bio: String(card && card.bio || ''),
      createdByUid: String(card && card.createdByUid || ''),
      updatedAt: String(card && card.updatedAt || '')
    };
  }

  function loadStoredMemberCards() {
    try {
      var raw = window.localStorage.getItem(getMemberCardStorageKey());
      var parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed.map(normalizeStoredMemberCard).filter(function (card) { return card.id; }) : [];
    } catch (error) {
      return [];
    }
  }

  function saveStoredMemberCards(cards) {
    window.localStorage.setItem(getMemberCardStorageKey(), JSON.stringify(cards));
  }

  function canEditMemberCard(card) {
    if (!card || !currentAccountUser) return false;
    return isAdminUser(currentAccountUser) || String(currentAccountUser.uid || '') === String(card.ownerUid || '');
  }

  function getStoredMemberCard(cardId) {
    return loadStoredMemberCards().find(function (card) { return card.id === cardId; }) || null;
  }

  function getStoredMemberCardsForSection(familyKey, sectionId) {
    return loadStoredMemberCards().filter(function (card) {
      return card.family === familyKey && card.sectionId === sectionId;
    });
  }

  function toDisplayMemberCard(card) {
    return {
      name: card.ownerName,
      image: card.image,
      bio: card.bio,
      instrumentTitle: card.instrumentTitle,
      isCustom: true,
      cardId: card.id,
      editable: canEditMemberCard(card)

  }

  function setAccountLinks(user) {
    if (!accountLinks.length) return;
    accountLinks.forEach(function (link) {
      var signInHref = link.dataset.signinHref || '{{ "/capstone/powayorchestra/signin/" | relative_url }}';
      var profileHref = link.dataset.profileHref || '{{ "/capstone/powayorchestra/profile/" | relative_url }}';
      if (user && user.name) {
        link.textContent = user.name;
        link.href = profileHref;
        link.setAttribute('aria-label', user.name + ' profile');
      } else {
        link.textContent = link.dataset.signinLabel || 'Sign In';
        link.href = signInHref;
        link.setAttribute('aria-label', link.dataset.signinLabel || 'Sign In');
      }
    });

  function loadAccountIdentity() {
    if (!accountLinks.length) return;

      method: 'GET',
      mode: 'cors',
      cache: 'default',
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json',
        'X-Origin': 'client'
      }
    }).then(function (response) {
      if (!response.ok) return null;
      return response.json();
    }).then(function (data) {
      currentAccountUser = data && data.name ? data : null;
      setAccountLinks(currentAccountUser);
      renderMemberCardControls();
      refreshVisibleMusicianCards();
    }).catch(function () {
      currentAccountUser = null;
      setAccountLinks(null);
      renderMemberCardControls();
    });

  function getFamilyConfig(familyKey) {
    return instrumentFamilyData[familyKey] || null;
  }
  function makeInstrumentCard(familyKey, family) {
    return '<button type="button" class="instrument-card" data-family="' + familyKey + '">'
      + '<span class="instrument-family-label">' + family.title + '</span>'
      + '<h3>' + family.cardHeading + '</h3>'
      + '<p>' + family.cardDescription + '</p>'
      + '<span class="instrument-card-note">' + family.cardNote + '</span>'
      + '<span class="instrument-floating-note" aria-hidden="true">♪</span>'
      + '<span class="instrument-floating-note note-2" aria-hidden="true">♫</span>'
      + '<span class="instrument-floating-note note-3" aria-hidden="true">♩</span>'
      + '<span class="instrument-visual" aria-hidden="true">' + family.visual + '</span>'
      + '</button>';
  }
  function renderInstrumentCards() {
    if (!instrumentGrid) return;
    instrumentGrid.innerHTML = Object.keys(instrumentFamilyData).map(function (familyKey) {
      return makeInstrumentCard(familyKey, instrumentFamilyData[familyKey]);
    }).join('');
    instrumentCards = Array.prototype.slice.call(instrumentGrid.querySelectorAll('.instrument-card'));
  }
  function makeChips(items) { return items.map(function (item) { return '<span class="instrument-chip">' + item + '</span>'; }).join(''); }
  function makeSectionButtons(sections) { return sections.map(function (section) { return '<button type="button" class="musician-section-chip" data-section-id="' + section.id + '">' + section.label + '</button>'; }).join(''); }
  function normalizeInstrumentKey(value) { return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, ''); }
  function getInstrumentSamplePath(instrumentTitle) {
    var normalizedKey = normalizeInstrumentKey(instrumentTitle);
    var lookupKey = instrumentSampleAliases[normalizedKey] || normalizedKey;
    return instrumentSampleAudio[lookupKey] || '';
  }
  function normalizeMember(member) {
    if (typeof member === 'string') {
      return { name: member, image: '', bio: '', instrumentTitle: '', isCustom: false, cardId: '', editable: false };
    }

    return {
      name: member.name || '',
      image: member.image || '',
      bio: member.bio || '',
      instrumentTitle: member.instrumentTitle || '',
      isCustom: member.isCustom === true,
      cardId: member.cardId || '',
      editable: member.editable === true
    };
  }
  function makeMemberCard(member, instrumentTitle) {
    var person = normalizeMember(member);
    var displayInstrumentTitle = person.instrumentTitle || instrumentTitle;
    var samplePath = getInstrumentSamplePath(displayInstrumentTitle);
    var imageMarkup = person.image
      ? '<img src="' + escapeHtml(person.image) + '" alt="' + escapeHtml(person.name) + ' portrait" class="musician-member-photo">'
      : '<div class="musician-member-photo musician-member-photo--empty" aria-hidden="true"></div>';
    var sampleButtonMarkup = samplePath
      ? '<button type="button" class="sample-play-sample-btn musician-sample-btn" data-audio="' + samplePath + '" data-default-label="&#9654;" aria-label="Play instrument sample" title="Play instrument sample">&#9654;</button>'
      : '<button type="button" class="sample-play-sample-btn musician-sample-btn is-unavailable" disabled aria-disabled="true" aria-label="Instrument sample coming soon" title="Instrument sample coming soon">&#9654;</button>';
    var editButtonMarkup = person.editable
      ? '<button type="button" class="musician-card-edit-btn" data-member-card-edit="' + escapeHtml(person.cardId) + '">Edit</button>'
      : '';
    var bioMarkup = person.bio
      ? '<p class="musician-member-bio">' + escapeHtml(person.bio) + '</p>'
      : '';

    return '<article class="musician-member-card">'
      + '<div class="musician-member-photo-shell">' + imageMarkup + '</div>'
      + '<div class="musician-member-card-copy">'
      + '<div class="musician-member-card-top">'
      + '<p class="musician-member-instrument">' + escapeHtml(displayInstrumentTitle) + '</p>'
      + '<div class="musician-member-card-actions">' + sampleButtonMarkup + editButtonMarkup + '</div>'
      + '</div>'
      + '<h6 class="musician-member-name">' + escapeHtml(person.name) + '</h6>'
      + bioMarkup
      + '</div>'
      + '</article>';
  }
  function makeMemberGroups(groups, familyKey, sectionId) {
    var renderedGroups = groups.slice();
    var customCards = familyKey && sectionId ? getStoredMemberCardsForSection(familyKey, sectionId) : [];
    if (customCards.length) {
      renderedGroups.push({
        title: 'Member Cards',
        members: customCards.map(toDisplayMemberCard)
      });
    }

    return renderedGroups.map(function (group) {
      return '<article class="musician-member-group"><h5>' + group.title + '</h5><div class="musician-member-card-grid">'
        + group.members.map(function (member) {
          var normalized = normalizeMember(member);
          return makeMemberCard(normalized, normalized.instrumentTitle || group.title);
        }).join('')
        + '</div></article>';
    }).join('');
  }
  function makeSearchResultCards(results) {
    return '<div class="musician-search-results-grid">'
      + results.map(function (result) { return makeMemberCard(result.member, result.instrumentTitle); }).join('')
